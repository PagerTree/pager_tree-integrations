name: Tests

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
      redis:
        image: redis
        ports: ['6379:6379']
        options: --entrypoint redis-server
    steps:
      - uses: actions/checkout@master
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler: default
          bundler-cache: true
          rubygems: "3.4.4"
      - name: StandardRb check
        run: |
          bundle exec standardrb -v
          bundle exec standardrb
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          RAILS_ENV: test
          PG_USER: postgres
          HOOK_RELAY_API_KEY: "${{secrets.HOOK_RELAY_API_KEY}}"
          HOOK_RELAY_ACCOUNT_ID: "${{secrets.HOOK_RELAY_ACCOUNT_ID}}"
          HOOK_RELAY_HOOK_ID: "${{secrets.HOOK_RELAY_HOOK_ID}}"
          INTEGRATION_CUSTOM_WEBHOOK_V3_SERVICE_URL: "${{secrets.INTEGRATION_CUSTOM_WEBHOOK_V3_SERVICE_URL}}"
        run: |
          bin/rails db:test:prepare
          bin/rails test